<!DOCTYPE html>
<html>
<head>

<title>Customer Feedback Survey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Customer Feedback Survey</h1>

<form id="surveyForm">

<label>Customer Name</label>
<input type="text" id="name" name="name" placeholder="Enter your name" required>


<label>Email Address</label>
<input type="email" id="email" name="email" placeholder="Enter your email" required>


<label>1. What is the main reason you choose this store over others?</label>

<select name="reason" id="reason" required>
<option value="">Select option</option>
<option>Product Quality</option>
<option>Price</option>
<option>Variety of Products</option>
<option>Customer Service</option>
<option>Location Convenience</option>
<option>Other</option>
</select>

<textarea name="reasonOther" id="reasonOther" placeholder="If other, please specify"></textarea>


<label>2. How would you rate the quality of the products?</label>

<select name="quality" id="quality" required>
<option value="">Select rating</option>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>


<label>3. Do you feel the products provide good value for money?</label>

<select name="value" id="value" required>
<option value="">Select option</option>
<option>Yes, definitely</option>
<option>Somewhat</option>
<option>No</option>
</select>


<label>4. How do you find the prices compared to other stores?</label>

<select name="price" id="price" required>
<option value="">Select option</option>
<option>Lower than other stores</option>
<option>Similar to other stores</option>
<option>Higher than other stores</option>
<option>Not sure</option>
</select>


<label>5. Do offers, discounts, or festival sales affect your buying decisions?</label>

<select name="offers" id="offers" required>
<option value="">Select option</option>
<option>Yes, a lot</option>
<option>Sometimes</option>
<option>Not much</option>
<option>Never</option>
</select>


<label>6. How would you rate the service provided by the staff?</label>

<select name="service" id="service" required>
<option value="">Select rating</option>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>


<label>7. What do you like most about this store?</label>

<select name="like" id="like" required>
<option value="">Select option</option>
<option>Price</option>
<option>Product Quality</option>
<option>Variety</option>
<option>Service</option>
<option>Offers & Discounts</option>
<option>Other</option>
</select>

<textarea name="likeOther" id="likeOther" placeholder="If other, please specify"></textarea>
